name: collective-event-twin-p0

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: worldline
      POSTGRES_PASSWORD: worldline
      POSTGRES_DB: worldline
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldline -d worldline"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.25.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: worldline
      POSTGRES_PWD: worldline
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "17233:7233"
    volumes:
      - ./temporal-dynamicconfig:/etc/temporal/config/dynamicconfig

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      WORLDLINE_DATABASE_URL: postgresql+psycopg://worldline:worldline@postgres:5432/worldline
      WORLDLINE_REDIS_URL: redis://redis:6379/0
      WORLDLINE_TEMPORAL_ADDRESS: temporal:7233
      WORLDLINE_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173
      WORLDLINE_LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    depends_on:
      api:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      WORLDLINE_DATABASE_URL: postgresql+psycopg://worldline:worldline@postgres:5432/worldline
      WORLDLINE_REDIS_URL: redis://redis:6379/0
      WORLDLINE_TEMPORAL_ADDRESS: temporal:7233
      WORLDLINE_LOG_LEVEL: INFO

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres-data:
