<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WORLDLINE OBSERVER · 信号工厂</title>
  <style>
    :root {
      --bg: #f3efe7;
      --panel: rgba(255, 253, 247, .9);
      --panel-solid: #fffdf7;
      --ink: #14181d;
      --muted: #5f6874;
      --line: #d8cdbc;
      --blue: #2f6df6;
      --green: #18a873;
      --amber: #d78925;
      --red: #df4b54;
      --violet: #7f63c9;
      --soft: 0 10px 24px rgba(42, 34, 22, .07);
      --r: 14px;
      --ease: cubic-bezier(.16, 1, .3, 1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100dvh;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 10%, rgba(215, 137, 37, .08), transparent 28%),
        radial-gradient(circle at 76% 8%, rgba(47, 109, 246, .07), transparent 30%),
        linear-gradient(180deg, #faf7f0 0%, var(--bg) 100%);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
    }
    button, a { font: inherit; color: inherit; }
    button { border: 0; background: transparent; cursor: pointer; }
    a { text-decoration: none; }
    button:active, a:active { transform: translateY(1px) scale(.99); }

    .app { height: 100dvh; display: grid; grid-template-rows: 56px 104px 1fr 70px; }
    .topbar {
      display: grid;
      grid-template-columns: 260px 1fr 500px;
      align-items: center;
      gap: 18px;
      padding: 0 16px;
      border-bottom: 1px solid rgba(216,205,188,.92);
      background: rgba(255,253,247,.76);
      backdrop-filter: blur(16px);
    }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 900; letter-spacing: .08em; white-space: nowrap; }
    .brand-mark {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), #7bd0ff);
      position: relative;
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      left: 7px;
      top: 3px;
      width: 4px;
      height: 20px;
      border-radius: 3px;
      background: white;
      transform: rotate(42deg);
    }
    .tagline { color: var(--muted); font-size: 11px; font-weight: 800; }
    .mode-tabs {
      justify-self: center;
      display: flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #e8e1d6;
    }
    .mode-tabs a, .mode-tabs button {
      min-width: 64px;
      height: 34px;
      display: grid;
      place-items: center;
      padding: 0 15px;
      border-radius: 12px;
      color: var(--muted);
      font-weight: 800;
    }
    .mode-tabs .active { background: var(--ink); color: white; box-shadow: var(--soft); }
    .status { display: flex; justify-content: flex-end; align-items: center; gap: 12px; color: var(--muted); font-size: 12px; font-weight: 800; white-space: nowrap; overflow: hidden; }
    .status span { white-space: nowrap; }
    .status strong { color: var(--green); }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 6px rgba(24,168,115,.14); }

    .metrics { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 10px 14px; }
    .metric {
      min-height: 84px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,253,247,.76);
      text-align: left;
      transition: border-color .22s var(--ease), background .22s var(--ease), transform .22s var(--ease);
    }
    .metric:hover, .metric.active { transform: translateY(-1px); border-color: var(--ink); background: var(--panel-solid); }
    .metric label { display: flex; justify-content: space-between; color: var(--muted); font-size: 11px; font-weight: 900; }
    .metric b { display: block; margin-top: 8px; font-size: 25px; line-height: .95; color: var(--tone); }
    .metric p { margin: 7px 0 0; color: var(--muted); font-size: 11px; font-weight: 800; }

    .workspace {
      display: grid;
      grid-template-columns: 230px minmax(650px, 1fr) 390px;
      gap: 10px;
      min-height: 0;
      padding: 0 14px 10px;
    }
    .panel {
      min-width: 0;
      min-height: 0;
      border: 1px solid rgba(216,205,188,.92);
      border-radius: var(--r);
      background: var(--panel);
      box-shadow: var(--soft);
      overflow: hidden;
    }
    .pad { padding: 14px; }
    .title { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 11px; font-size: 14px; font-weight: 900; }
    .title span { color: var(--muted); font-size: 11px; font-weight: 800; }

    .filters { display: grid; gap: 10px; }
    .filter { display: grid; gap: 6px; }
    .filter label { color: var(--ink); font-size: 12px; font-weight: 900; }
    .select, .slider, .toggle, .back {
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,253,247,.64);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .slider { display: grid; gap: 7px; padding: 8px 9px; }
    .select.active, .toggle.active { border-color: var(--ink); color: var(--ink); background: var(--panel-solid); }
    .track { height: 4px; border-radius: 999px; background: #e6ddcf; overflow: hidden; }
    .track i { display: block; height: 100%; width: var(--v); border-radius: inherit; background: var(--blue); }
    .toggle i { width: 28px; height: 16px; border-radius: 999px; background: #c9c0b3; position: relative; }
    .toggle.active i { background: var(--ink); }
    .toggle.active i::after { left: 14px; }
    .toggle i::after { content: ""; position: absolute; width: 12px; height: 12px; left: 2px; top: 2px; border-radius: 50%; background: white; transition: left .2s var(--ease); }
    .back { justify-content: center; color: var(--ink); background: var(--panel-solid); }

    .list-panel { display: grid; grid-template-rows: auto auto auto minmax(0, 1fr) 152px auto; }
    .list-tools {
      display: grid;
      grid-template-columns: 1fr 120px 220px 108px 128px;
      gap: 9px;
      align-items: center;
      padding: 14px 14px 10px;
    }
    .search, .tool-btn, .return-btn {
      min-height: 34px;
      display: flex;
      align-items: center;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,253,247,.64);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .tool-btn { justify-content: center; color: var(--ink); background: var(--panel-solid); }
    .tool-btn.active { background: var(--ink); color: white; border-color: var(--ink); }
    .return-btn { justify-content: center; color: white; background: var(--ink); border-color: var(--ink); }
    .quick-tags {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 14px 9px;
      border-bottom: 1px solid rgba(216,205,188,.7);
    }
    .quick-tags button {
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,253,247,.68);
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }
    .quick-tags button.active { background: var(--ink); color: white; border-color: var(--ink); }
    .table-head, .signal-row {
      display: grid;
      grid-template-columns: 78px 1.48fr .56fr .56fr .66fr .88fr .38fr .52fr .66fr;
      gap: 9px;
      align-items: center;
    }
    .table-head {
      margin: 0 14px;
      padding: 10px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }
    .table-body { min-height: 0; overflow: hidden; padding: 0 14px; }
    .signal-row {
      width: 100%;
      min-height: 46px;
      padding: 6px 10px;
      border-bottom: 1px solid rgba(216,205,188,.82);
      color: var(--ink);
      transition: background .22s var(--ease), opacity .22s var(--ease);
      cursor: pointer;
    }
    .signal-row:hover, .signal-row.active { background: color-mix(in srgb, var(--tone) 8%, var(--panel-solid)); }
    .select-pri { display: flex; align-items: center; gap: 7px; }
    .check {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--panel-solid);
      color: transparent;
      font-size: 12px;
      font-weight: 900;
    }
    .check.checked { background: var(--ink); border-color: var(--ink); color: white; }
    .pri { width: 31px; height: 24px; display: grid; place-items: center; border-radius: 8px; background: var(--tone); color: white; font-size: 11px; font-weight: 900; }
    .summary b { display: block; font-size: 13px; line-height: 1.25; }
    .summary span { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; }
    .summary small { display: block; margin-top: 2px; color: color-mix(in srgb, var(--tone) 70%, var(--ink)); font-size: 10px; font-weight: 900; }
    .num { font-size: 16px; font-weight: 900; }
    .tag-list { display: grid; gap: 3px; }
    .tag { display: inline-flex; width: fit-content; align-items: center; min-height: 20px; padding: 0 7px; border-radius: 999px; color: var(--tone); background: color-mix(in srgb, var(--tone) 12%, var(--panel-solid)); font-size: 10px; font-weight: 900; }
    .trend.up { color: var(--red); font-weight: 900; }
    .trend.flat { color: var(--blue); font-weight: 900; }
    .state { display: inline-flex; width: fit-content; min-height: 24px; align-items: center; padding: 0 8px; border-radius: 8px; border: 1px solid var(--tone); color: var(--tone); font-size: 11px; font-weight: 900; }
    .pager {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 9px 0 10px;
    }
    .pager button {
      min-width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255,253,247,.64);
      font-size: 12px;
      font-weight: 900;
    }
    .pager button.active { background: var(--ink); color: white; border-color: var(--ink); }
    .triage-dock {
      display: grid;
      grid-template-columns: 1.08fr 1.1fr .82fr;
      gap: 10px;
      margin: 0 14px;
      padding: 10px 0 0;
      border-top: 1px solid rgba(216,205,188,.72);
      min-height: 0;
    }
    .dock-card {
      min-width: 0;
      padding: 10px;
      border: 1px solid rgba(216,205,188,.92);
      border-radius: 12px;
      background: rgba(255,253,247,.66);
      overflow: hidden;
    }
    .dock-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; font-size: 12px; font-weight: 900; }
    .dock-title span { color: var(--muted); font-size: 10px; }
    .batch-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
    .batch-actions button, .mini-action {
      min-height: 28px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-solid);
      color: var(--ink);
      font-size: 11px;
      font-weight: 900;
    }
    .batch-actions button.primary { background: var(--ink); color: white; border-color: var(--ink); }
    .merge-list { display: grid; gap: 5px; color: var(--muted); font-size: 11px; }
    .merge-row { display: flex; justify-content: space-between; gap: 8px; min-width: 0; }
    .merge-row b { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .graph-box { position: relative; height: 96px; border-radius: 10px; background: linear-gradient(180deg, rgba(20,24,29,.03), rgba(20,24,29,.01)); overflow: hidden; }
    .graph-box svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .graph-node { position: absolute; min-width: 54px; padding: 4px 6px; border-radius: 999px; background: var(--panel-solid); border: 1px solid var(--line); color: var(--ink); font-size: 10px; font-weight: 900; text-align: center; box-shadow: 0 4px 10px rgba(42,34,22,.05); }
    .graph-node.core { background: var(--ink); color: white; border-color: var(--ink); }
    .false-bars { display: grid; gap: 6px; }
    .false-row { display: grid; grid-template-columns: 70px 1fr 30px; gap: 7px; align-items: center; color: var(--muted); font-size: 11px; }
    .false-row i { display: block; height: 6px; border-radius: 999px; background: var(--amber); width: var(--v); }

    .detail-panel { display: grid; grid-template-rows: 1fr auto; }
    .detail { min-height: 0; overflow: hidden; padding: 12px 14px; }
    .detail h2 { margin: 0; font-size: 18px; line-height: 1.2; }
    .detail-meta { display: flex; justify-content: space-between; gap: 12px; margin-top: 7px; color: var(--muted); font-size: 11px; font-weight: 800; }
    .score-box, .why, .sources, .history, .evidence { margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--line); }
    .score-title { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; font-weight: 900; }
    .score-title b { color: var(--red); font-size: 26px; }
    .bars { display: grid; gap: 4px; margin-top: 7px; }
    .bar { display: grid; grid-template-columns: 78px 1fr 34px; gap: 8px; align-items: center; color: var(--muted); font-size: 11px; }
    .bar span:nth-child(2) { height: 6px; border-radius: 999px; background: #e6ddcf; overflow: hidden; }
    .bar i { display: block; height: 100%; width: var(--v); border-radius: inherit; background: var(--red); }
    .why b, .sources b, .history b, .evidence b { display: block; margin-bottom: 5px; font-size: 13px; }
    .why p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.38; }
    .source-row, .support-row, .history-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; min-height: 23px; align-items: center; border-bottom: 1px solid rgba(216,205,188,.68); color: var(--muted); font-size: 12px; }
    .evidence-row { display: grid; gap: 3px; padding: 5px 0; border-bottom: 1px solid rgba(216,205,188,.68); color: var(--muted); font-size: 12px; }
    .evidence-row:last-child { border-bottom: 0; }
    .evidence-row header { display: flex; justify-content: space-between; gap: 10px; color: var(--ink); font-weight: 900; }
    .evidence-row p { margin: 0; line-height: 1.32; }
    .history-row span:last-child { color: var(--ink); font-weight: 900; }
    .section-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 5px; }
    .section-head b { margin: 0; }
    .link-btn { min-height: 22px; padding: 0 7px; border: 1px solid var(--line); border-radius: 999px; color: var(--muted); font-size: 10px; font-weight: 900; }
    .source-row:last-child, .support-row:last-child { border-bottom: 0; }
    .source-row span:last-child, .support-row span:last-child { color: var(--ink); font-weight: 800; }
    .direction { min-width: 42px; text-align: right; font-weight: 900; }
    .direction.up { color: var(--red); }
    .direction.down { color: var(--green); }
    .direction.flat { color: var(--blue); }
    .source-adjust { display: flex; align-items: center; gap: 4px; }
    .source-adjust button { min-width: 22px; height: 22px; border: 1px solid var(--line); border-radius: 7px; color: var(--muted); font-size: 10px; font-weight: 900; background: rgba(255,253,247,.72); }
    .source-adjust button.active { background: var(--ink); color: white; border-color: var(--ink); }
    .annotation { padding: 10px 14px 12px; border-top: 1px solid var(--line); background: rgba(255,253,247,.54); }
    .annotation .label { margin-bottom: 8px; font-size: 13px; font-weight: 900; }
    .mark-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
    .mark-buttons button { min-height: 28px; border: 1px solid var(--line); border-radius: 9px; color: var(--muted); font-size: 11px; font-weight: 900; }
    .mark-buttons button.active { border-color: var(--ink); color: white; background: var(--ink); }
    .upgrade { margin-top: 7px; min-height: 34px; width: 100%; border-radius: 10px; background: var(--ink); color: white; font-weight: 900; }

    .basket {
      display: grid;
      grid-template-columns: 220px 1fr auto;
      gap: 12px;
      align-items: center;
      margin: 0 14px 10px;
      padding: 9px 11px;
      border: 1px solid rgba(216,205,188,.92);
      border-radius: var(--r);
      background: var(--panel);
      box-shadow: var(--soft);
    }
    .basket-left { display: flex; align-items: center; gap: 7px; overflow: hidden; white-space: nowrap; }
    .basket-info b { display: block; font-size: 13px; }
    .basket-info span { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; font-weight: 800; }
    .basket-left b { font-size: 13px; }
    .chip { display: inline-flex; align-items: center; min-height: 26px; padding: 0 9px; border: 1px solid var(--line); border-radius: 8px; color: var(--muted); font-size: 11px; font-weight: 900; background: rgba(255,253,247,.64); }
    .basket a { min-height: 34px; display: grid; place-items: center; padding: 0 14px; border-radius: 10px; background: var(--ink); color: white; font-size: 12px; font-weight: 900; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 82px;
      transform: translateX(-50%) translateY(8px);
      min-height: 34px;
      display: grid;
      place-items: center;
      padding: 0 14px;
      border-radius: 10px;
      background: var(--ink);
      color: white;
      font-size: 12px;
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s var(--ease), transform .22s var(--ease);
      box-shadow: var(--soft);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><span class="brand-mark"></span><span>WORLDLINE OBSERVER</span></div>
      <nav class="mode-tabs" aria-label="Demo navigation">
        <a href="risk-dashboard.html">驾驶舱</a>
        <a class="active" href="data-hub.html">数据</a>
        <a href="mainline-builder.html">主线</a>
        <a href="worldline-observer.html">推演</a>
        <a href="agent-council.html">会议</a>
        <a href="decision-brief.html">汇报</a>
      </nav>
      <div class="status"><span>数据快照：2026-04-25 12:00</span><span>批次：batch-20260425-001</span><span>抽取状态：<strong>已完成</strong></span><span class="live-dot"></span></div>
    </header>

    <section class="metrics" id="metrics"></section>

    <section class="workspace">
      <aside class="panel pad">
        <div class="title">筛选器 <span>快速定位重点信号</span></div>
        <div class="filters">
          <div class="filter"><label>采集时间</label><button class="select control" data-filter="new">近 24 小时新增 <span>⌄</span></button></div>
          <div class="filter"><label>来源通道</label><button class="select control" data-filter="source">热线/网格优先 <span>⌄</span></button></div>
          <div class="filter"><label>处置状态</label><button class="select control" data-filter="review">待复核优先 <span>⌄</span></button></div>
          <div class="filter"><label>入推演阈值</label><button class="slider control" data-filter="threshold"><span>弱信号评分 ≥ 0.86</span><span class="track"><i style="--v:86%"></i></span></button></div>
          <div class="filter"><label>新近变化</label><button class="slider control" data-filter="novel"><span>新颖性 ≥ 0.70</span><span class="track"><i style="--v:70%"></i></span></button></div>
          <div class="filter"><label>主线语义</label><button class="select control" data-filter="lead">高价值优先 <span>⌄</span></button></div>
          <div class="filter"><label>支点命中</label><button class="select control" data-filter="supports">全部支点 <span>⌄</span></button></div>
          <div class="filter"><button class="toggle control" data-filter="all"><span>重置筛选</span><i></i></button></div>
        </div>
      </aside>

      <section class="panel list-panel">
        <div class="list-tools">
          <div class="title" style="margin:0">信号列表 <span id="listCount">共 76 条</span></div>
          <div class="select">综合优先级 <span>⌄</span></div>
          <div class="search">搜索信号摘要 / 关键词</div>
          <button class="tool-btn" id="batchBtn">全选可见</button>
          <a class="return-btn" href="risk-dashboard.html">回到主控台</a>
        </div>
        <div class="quick-tags" id="quickTags"></div>
        <div class="table-head"><span>选择/优先级</span><span>信号摘要</span><span>弱信号评分</span><span>新颖性</span><span>风险语义</span><span>关联支点</span><span>证据</span><span>趋势</span><span>状态</span></div>
        <div class="table-body" id="signalRows"></div>
        <div class="triage-dock" id="triageDock"></div>
        <div class="pager" aria-label="Pagination">
          <button>‹</button><button class="active">1</button><button>2</button><button>3</button><button>4</button><button>5</button><button>…</button><button>8</button><button>›</button>
        </div>
      </section>

      <aside class="panel detail-panel">
        <section class="detail" id="detail"></section>
        <section class="annotation">
          <div class="label">人工标注与入篮</div>
          <div class="mark-buttons">
            <button>无关</button>
            <button class="active" style="--tone:var(--amber)">待观察</button>
            <button style="--tone:var(--amber)">弱信号</button>
            <button style="--tone:var(--red)">高价值前兆</button>
            <button>误报</button>
          </div>
          <button class="upgrade" id="addToBasket">加入推演输入</button>
        </section>
      </aside>
    </section>

    <section class="basket">

    }

    function handleBatchAction(action) {
      const ids = batchSelected.length ? batchSelected : [selectedId];
      if (action === "merge") {
        showToast(`已生成 ${ids.length} 条信号的合并候选，保留原始证据链`);
      }
      if (action === "pool") {
        ids.forEach(id => {
          if (!basket.includes(id)) basket.push(id);
        });
        showToast(`已将 ${ids.length} 条信号加入推演输入池`);
      }
      if (action === "false") {
        showToast("已记录误报原因：地点错配 / 重复转发 / 语义误读");
      }
      renderAll();
    }

    function renderAll() {
      renderMetrics();
      renderQuickTags();
      $$(".control").forEach(item => item.classList.toggle("active", item.dataset.filter === activeFilter));
      renderRows();
      renderDetail();
      renderTriageDock();
      renderBasket();
    }

    $("#addToBasket").addEventListener("click", addSelectedToBasket);
    $$(".control").forEach(control => control.addEventListener("click", () => {
      $$(".control").forEach(item => item.classList.remove("active"));
      control.classList.add("active");
      if (control.dataset.filter) {
        activeFilter = control.dataset.filter;
        hotspotFilter = "";
        renderAll();
        $(`.control[data-filter="${control.dataset.filter}"]`)?.classList.add("active");
        showToast(`已按“${control.textContent.trim()}”筛选信号列表`);
      } else {
        showToast(control.dataset.feedback || "筛选条件已更新");
      }
    }));
    $$(".mark-buttons button").forEach(btn => btn.addEventListener("click", () => {
      $$(".mark-buttons button").forEach(item => item.classList.remove("active"));
      btn.classList.add("active");
      showToast(`人工标注已设为：${btn.textContent.trim()}`);
    }));
    $$(".pager button").forEach(btn => btn.addEventListener("click", () => {
      $$(".pager button").forEach(item => item.classList.remove("active"));
      if (!["‹", "›", "…"].includes(btn.textContent.trim())) btn.classList.add("active");
      showToast(`已切换到第 ${btn.textContent.trim()} 页`);
    }));
    $("#batchBtn").addEventListener("click", () => {
      const ids = visibleSignals().map(s => s.id);
      const allSelected = ids.length > 0 && ids.every(id => batchSelected.includes(id));
      batchSelected = allSelected ? batchSelected.filter(id => !ids.includes(id)) : [...new Set(batchSelected.concat(ids))];
      $("#batchBtn").textContent = allSelected ? "全选可见" : "清空可见";
      showToast(allSelected ? "已清空当前可见信号选择" : `已选择当前可见 ${ids.length} 条信号`);
      renderRows();
      renderTriageDock();
    });
    if (hotspotFilter) {
      const firstHotspotSignal = signals.find(s => s.hotspot?.includes(hotspotFilter));
      if (firstHotspotSignal) selectedId = firstHotspotSignal.id;
      showToast(`已按地图热区筛选：${hotspotFilter}`);
    }
    renderAll();
  </script>
  <script src="mock/mock-api.js"></script>
  <script src="iran-narrative-overrides.js?v=20260428-goldenpath1"></script>
  <script src="golden-path.js?v=20260428-goldenpath1"></script>
</body>
