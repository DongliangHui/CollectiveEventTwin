  schemas:
    GenericObject:
      type: object
      additionalProperties: true

    EnvelopeBase:
      type: object
      required: [data, meta, trace_id]
      properties:
        data: {}
        meta:
          type: object
          additionalProperties: true
        trace_id:
          type: string

    ErrorEnvelope:
      type: object
      required: [error, trace_id]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              $ref: "#/components/schemas/ErrorCode"
            message:
              type: string
            details:
              type: object
              additionalProperties: true
        trace_id:
          type: string

    ErrorCode:
      type: string
      enum:
        - BAD_REQUEST
        - UNAUTHENTICATED
        - FORBIDDEN
        - NOT_FOUND
        - STATE_CONFLICT
        - VALIDATION_ERROR
        - RATE_LIMITED
        - INTERNAL_ERROR
        - DEPENDENCY_UNAVAILABLE
        - SOURCE_POLICY_BLOCKED
        - SOURCE_UNHEALTHY
        - RUN_NOT_RETRYABLE
        - SCHEMA_INVALID
        - EVIDENCE_REF_MISSING
        - CLAIM_BLOCKED
        - REVIEW_REQUIRED
        - CLAIM_VALIDATION_FAILED
        - VISUAL_BASELINE_FAILED

    PageState:
      type: string
      enum: [loading, ready, empty, error, degraded, no_permission]

    ReviewStatus:
      type: string
      enum: [pending, pass, fail, waived]

    EvidenceReviewStatus:
      type: string
      enum: [pending, confirmed, rejected, probability_reference_only, needs_review]

    ReviewObjectType:
      type: string
      enum:
        - api
        - data_source
        - algorithm_output
        - media_output
        - agent_profile
        - council_result
        - report
        - frontend_page
        - config_version
        - task

    WorkflowStatus:
      type: string
      enum: [pending, running, retrying, delayed, cancelling, failed, completed, canceled]

    TopicStatus:
      type: string
      enum: [candidate, observing, active, merged, archived, converted_to_mainline]

    SignalStatus:
      type: string
      enum: [raw_candidate, selected, in_package, sent_to_review, excluded, archived]

    EvidenceStatus:
      type: string
      enum: [candidate, needs_review, confirmed_fact, rejected, probability_reference_only, used_in_mainline]

    MainlineStatus:
      type: string
      enum: [draft, quality_failed, pending_confirmation, confirmed, world_state_generated, archived]

    WorldlineRunStatus:
      type: string
      enum: [pending, running, completed, failed, canceled, superseded]

    CouncilStatus:
      type: string
      enum: [created, profile_checking, running, schema_validating, blocked, completed, applied]

    ReportStatus:
      type: string
      enum: [draft, claim_validation_failed, submitted_review, review_returned, approved, published, exported, archived]

    SourceType:
      type: string
      enum: [synthetic, manual, manual_upload, file_upload, public_web, official_api, rss, webhook, db_import, object_storage, media, live_segment]

    DataSourceType:
      type: object
      required: [source_type, label, requires_external_key]
      properties:
        source_type:
          $ref: "#/components/schemas/SourceType"
        label: { type: string }
        requires_external_key: { type: boolean }

    EntityRef:
      type: object
      required: [object_type, object_id]
      properties:
        object_type: { type: string }
        object_id: { type: string }
        object_version: { type: [string, "null"] }

    EvidenceRef:
      allOf:
        - $ref: "#/components/schemas/EntityRef"
        - type: object
          properties:
            excerpt_hash: { type: [string, "null"] }
            confidence: { type: number, minimum: 0, maximum: 1 }

    AuditContext:
      type: object
      required: [object_type, object_id]
      properties:
        object_type: { type: string }
        object_id: { type: string }
        object_version: { type: [string, "null"] }
        actor_id: { type: [string, "null"] }

    PageViewModel:
      type: object
      required: [page_state, permissions, refresh_at, data_freshness, degraded_sources, audit_context, primary_data, actions]
      properties:
        page_state:
          $ref: "#/components/schemas/PageState"
        permissions:
          type: object
          additionalProperties: true
        refresh_at:
          type: string
          format: date-time
        data_freshness:
          type: object
          additionalProperties: true
        degraded_sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceHealth"
        audit_context:
          $ref: "#/components/schemas/AuditContext"
        primary_data:
          type: object
          additionalProperties: true
        actions:
          type: array
          items:
            $ref: "#/components/schemas/ActionDescriptor"

    ActionDescriptor:
      type: object
      required: [id, label, method, href, enabled]
      properties:
        id: { type: string }
        label: { type: string }
        method: { type: string, enum: [GET, POST, PATCH, DELETE] }
        href: { type: string }
        enabled: { type: boolean }
        disabled_reason: { type: [string, "null"] }

    ButtonPermissionState:
      type: object
      required: [button_id, label, required_permission, visible, enabled]
      properties:
        button_id: { type: string }
        label: { type: string }
        required_permission: { type: string }
        visible: { type: boolean }
        enabled: { type: boolean }
        disabled_reason: { type: [string, "null"] }

    NavigationItem:
      type: object
      required: [id, label, path, section, order, required_permission, visible, enabled, button_states]
      properties:
        id: { type: string }
        label: { type: string }
        path: { type: string }
        section: { type: string }
        order: { type: integer }
        required_permission: { type: string }
        visible: { type: boolean }
        enabled: { type: boolean }
        disabled_reason: { type: [string, "null"] }
        button_states:
          type: array
          items:
            $ref: "#/components/schemas/ButtonPermissionState"

    NavigationResponse:
      type: object
      required: [items, button_states]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/NavigationItem"
        button_states:
          type: array
          items:
            $ref: "#/components/schemas/ButtonPermissionState"

    CurrentPermissionResponse:
      type: object
      required: [permissions, button_states]
      properties:
        permissions:
          type: array
          items: { type: string }
        button_states:
          type: array
          items:
            $ref: "#/components/schemas/ButtonPermissionState"

    PageSurfaceContract:
      type: object
      required: [surface_id, route, owner, title, required_permissions, api_operations, states, actions]
      properties:
        surface_id: { type: string }
        route: { type: string }
        owner: { type: string }
        title: { type: string }
        required_permissions:
          type: array
          items: { type: string }
        api_operations:
          type: array
          items: { type: string }
        states:
          type: array
          items: { type: string }
        actions:
          type: array
          items:
            $ref: "#/components/schemas/ActionDescriptor"
        payload: { type: object, additionalProperties: true }

    PageViewState:
      type: object
      required: [surface_id, state, trigger, expected_api_calls, expected_ui_assertions]
      properties:
        surface_id: { type: string }
        state: { type: string, enum: [loading, ready, empty, error, degraded, no_permission] }
        trigger: { type: string }
        expected_api_calls:
          type: array
          items: { type: string }
        expected_ui_assertions:
          type: array
          items: { type: string }
        payload: { type: object, additionalProperties: true }

    BrowserVerificationRecord:
      type: object
      required: [verification_id, surface_id, route, viewport, status]
      properties:
        verification_id: { type: string }
        surface_id: { type: string }
        route: { type: string }
        viewport: { type: string }
        status: { type: string, enum: [pass, fail, blocked] }
        network_assertions:
          type: array
          items: { type: object, additionalProperties: true }
        console_errors:
          type: array
          items: { type: string }
        screenshot_uri: { type: [string, "null"] }
        recorded_at: { type: [string, "null"], format: date-time }

    BusinessFlowEdge:
      type: object
      required: [from_state, to_state, trigger]
      properties:
        from_state: { type: string }
        to_state: { type: string }
        trigger: { type: string }
        api_operation: { type: [string, "null"] }
        guard: { type: [string, "null"] }

    BusinessStateMachine:
      type: object
      required: [state_machine_id, object_type, states, initial_state, terminal_states, edges]
      properties:
        state_machine_id: { type: string }
        object_type: { type: string }
        states:
          type: array
          items: { type: string }
        initial_state: { type: string }
        terminal_states:
          type: array
          items: { type: string }
        edges:
          type: array
          items:
            $ref: "#/components/schemas/BusinessFlowEdge"

    DecisionPoint:
      type: object
      required: [decision_id, label, actor, input_refs, allowed_outcomes, audit_required]
      properties:
        decision_id: { type: string }
        label: { type: string }
        actor: { type: string }
        input_refs:
          type: array
          items: { type: object, additionalProperties: true }
        allowed_outcomes:
          type: array
          items: { type: string }
        audit_required: { type: boolean }

    WriteBackPoint:
      type: object
      required: [write_back_id, label, api_operation, object_type, required_permission, audit_action]
      properties:
        write_back_id: { type: string }
        label: { type: string }
        api_operation: { type: string }
        object_type: { type: string }
        required_permission: { type: string }
        audit_action: { type: string }

    BusinessQualityGate:
      type: object
      required: [gate_id, label, stage, required_evidence, blocking]
      properties:
        gate_id: { type: string }
        label: { type: string }
        stage: { type: string }
        required_evidence:
          type: array
          items: { type: string }
        blocking: { type: boolean }

    BusinessCapabilityContract:
      type: object
      required: [capability_id, label, surface_ids, state_machine_ids, decision_points, write_back_points, quality_gates]
      properties:
        capability_id: { type: string }
        label: { type: string }
        surface_ids:
          type: array
          items: { type: string }
        state_machine_ids:
          type: array
          items: { type: string }
        decision_points:
          type: array
          items:
            $ref: "#/components/schemas/DecisionPoint"
        write_back_points:
          type: array
          items:
            $ref: "#/components/schemas/WriteBackPoint"
        quality_gates:
          type: array
          items:
            $ref: "#/components/schemas/BusinessQualityGate"

    ATTraceabilityRow:
      type: object
      required: [at_id, title, stage, api_operation, db_objects, status]
      properties:
        at_id: { type: string }
        title: { type: string }
        stage: { type: string }
        api_operation: { type: string }
        db_objects:
          type: array
          items: { type: string }
        surface_id: { type: [string, "null"] }
        test_id: { type: [string, "null"] }
        review_gate_id: { type: [string, "null"] }
        status: { type: string, enum: [pending, done, alias, deferred] }

    Health:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok, degraded, failed] }
        service: { type: string }
        latency_ms: { type: number }
        migration_revision: { type: [string, "null"] }
        details:
          type: object
          additionalProperties: true

    OpsHealthSummary:
      type: object
      required: [status, api, db, workers, checked_at]
      properties:
        status: { type: string, enum: [ok, degraded, failed] }
        api:
          $ref: "#/components/schemas/Health"
        db:
          $ref: "#/components/schemas/Health"
        workers:
          type: array
          items:
            $ref: "#/components/schemas/WorkerHealth"
        checked_at: { type: string, format: date-time }

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }

    AuthTokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_at]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, const: bearer }
        expires_at: { type: string, format: date-time }

    User:
      type: object
      required: [user_id, tenant_id, username, display_name, status, roles, permissions]
      properties:
        user_id: { type: string }
        tenant_id: { type: string }
        username: { type: string }
        display_name: { type: string }
        status: { type: string, enum: [active, disabled, locked] }
        roles:
          type: array
          items:
            $ref: "#/components/schemas/Role"
        permissions:
          type: array
          items: { type: string }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    UserWrite:
      type: object
      required: [username, display_name]
      properties:
        username: { type: string }
        display_name: { type: string }
        status: { type: string, enum: [active, disabled, locked] }
        role_ids:
          type: array
          items: { type: string }
        reason: { type: string }

    UserRolesUpdate:
      type: object
      required: [role_ids]
      properties:
        role_ids:
          type: array
          items: { type: string }
        reason: { type: [string, "null"] }

    UserStatusUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [active, disabled, locked] }
        reason: { type: [string, "null"] }

    Role:
      type: object
      required: [role_id, name, status, permission_codes]
      properties:
        role_id: { type: string }
        tenant_id: { type: string }
        name: { type: string }
        description: { type: [string, "null"] }
        status: { type: string, enum: [active, disabled] }
        permission_codes:
          type: array
          items: { type: string }
        payload: { type: object, additionalProperties: true }

    RoleWrite:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: [string, "null"] }
        permission_codes:
          type: array
          items: { type: string }
        status: { type: string, enum: [active, disabled] }
        payload: { type: object, additionalProperties: true }
        reason: { type: string }

    Permission:
      type: object
      required: [id, code]
      properties:
        id: { type: string }
        code: { type: string }
        description: { type: string }

    AuditLog:
      type: object
      required: [audit_id, action, object_type, object_id, created_at]
      properties:
        audit_id: { type: string }
        tenant_id: { type: [string, "null"] }
        case_id: { type: [string, "null"] }
        actor_id: { type: [string, "null"] }
        actor: { type: string }
        action: { type: string }
        object_type: { type: string }
        object_id: { type: string }
        object_version: { type: [string, "null"] }
        before: { type: object, additionalProperties: true }
        after: { type: object, additionalProperties: true }
        diff: { type: object, additionalProperties: true }
        reason: { type: [string, "null"] }
        trace_id: { type: string }
        ip: { type: [string, "null"] }
        user_agent: { type: [string, "null"] }
        created_at: { type: string, format: date-time }

    Review:
      type: object
      required: [review_id, object_type, object_id, object_version, template_id, status, created_at]
      properties:
        review_id: { type: string }
        object_type:
          $ref: "#/components/schemas/ReviewObjectType"
        object_id: { type: string }
        object_version: { type: string }
        template_id: { type: string }
        status:
          $ref: "#/components/schemas/ReviewStatus"
        reviewer_id: { type: [string, "null"] }
        findings:
          type: array
          items: { type: string }
        blockers:
          type: array
          items: { type: string }
        waiver_reason: { type: [string, "null"] }
        created_at: { type: string, format: date-time }
        completed_at: { type: [string, "null"], format: date-time }

    ReviewCreate:
      type: object
      required: [object_type, object_id, object_version, template_id]
      properties:
        object_type:
          $ref: "#/components/schemas/ReviewObjectType"
        object_id: { type: string }
        object_version: { type: string }
        template_id: { type: string }
        reason: { type: string }

    ReviewGateCreate:
      type: object
      properties:
        task_id: { type: [string, "null"] }
        object_type: { type: string, default: task }
        object_id: { type: [string, "null"] }
        object_version: { type: string, default: "1.0.0" }
        template_id: { type: string, default: TPL-API-V1 }
        payload: { type: object, additionalProperties: true }

    ReviewUpdate:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/ReviewStatus"
        findings:
          type: array
          items: { type: string }
        blockers:
          type: array
          items: { type: string }
        reason: { type: string }

    ReviewGateRetest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/ReviewStatus"
        findings:
          type: array
          items: { type: string }
        blockers:
          type: array
          items: { type: string }
        reason: { type: [string, "null"] }
        payload: { type: object, additionalProperties: true }

    WaiverCreate:
      type: object
      required: [approved_by, reason, risk, expires_at]
      properties:
        approved_by: { type: string }
        reason: { type: string }
        risk: { type: string }
        expires_at: { type: string, format: date-time }

    ReviewGateRecord:
      type: object
      required: [review_gate_id, review_id, object_type, object_id, object_version, template_id, status, findings, blockers, persistence_backend]
      properties:
        review_gate_id: { type: string }
        review_id: { type: string }
        task_id: { type: [string, "null"] }
        object_type:
          $ref: "#/components/schemas/ReviewObjectType"
        object_id: { type: string }
        object_version: { type: string }
        template_id: { type: string }
        status:
          $ref: "#/components/schemas/ReviewStatus"
        reviewer_id: { type: [string, "null"] }
        findings:
          type: array
          items: { type: string }
        blockers:
          type: array
          items: { type: string }
        waiver_reason: { type: [string, "null"] }
        waived_until: { type: [string, "null"], format: date-time }
        payload: { type: object, additionalProperties: true }
        persistence_backend: { type: string, const: reviews }
        alias_of: { type: string, const: /api/v1/reviews }
        created_at: { type: [string, "null"], format: date-time }
        completed_at: { type: [string, "null"], format: date-time }

    ReviewGateSummary:
      type: object
      required: [persistence_backend, total, counts_by_status, blocking_gate_ids, gates, generated_at]
      properties:
        persistence_backend: { type: string, const: reviews }
        alias_of: { type: string, const: /api/v1/reviews }
        total: { type: integer }
        counts_by_status:
          type: object
          additionalProperties:
            type: integer
        blocking_gate_ids:
          type: array
