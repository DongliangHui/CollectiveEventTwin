      parameters:
        - name: clean_record_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CleanRecordStatusUpdate"
      responses:
        "200":
          description: Clean-record status update result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanRecordStatusUpdateEnvelope"
