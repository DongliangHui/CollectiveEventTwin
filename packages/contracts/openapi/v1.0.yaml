openapi: 3.1.0
info:
  title: CollectiveEventTwin Production API
  version: 1.0.0
  description: >
    Frozen v1.0 OpenAPI and DTO contract derived from
    docs/production-plan-v1.0-20260509.md and
    docs/api-db-contract-v1.0-20260509.md. This file is the source-controlled
    contract for implementation; it does not imply the current FastAPI runtime
    has already implemented every operation.
servers:
  - url: http://127.0.0.1:8080
    description: Local development API
  - url: https://api.collective-event-twin.local
    description: Staging placeholder
security:
  - bearerAuth: []
tags:
  - name: System
  - name: Auth
  - name: RBAC
  - name: Audit
  - name: Review
  - name: Ops
  - name: Sources
  - name: Collection
  - name: Processing
  - name: City
  - name: Topic
  - name: Signal
  - name: Evidence
  - name: Mainline
  - name: Worldline
  - name: Agent
  - name: Council
  - name: Report
  - name: Task
  - name: Memory
  - name: Config
  - name: P0Compatibility
paths:
  /health:
    get:
      tags: [System]
      operationId: health
      security: []
      responses:
        "200":
          description: API is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded and created an auditable session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      responses:
        "200":
          description: Refreshed token pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      responses:
        "200":
          description: Session revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      responses:
        "200":
          description: Current user and tenant context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/auth/permissions:
    get:
      tags: [Auth]
      operationId: getCurrentPermissions
      responses:
        "200":
          description: Effective permissions for current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/me:
    get:
      tags: [Auth]
      operationId: getMe
      description: Canonical S1 current-user route. `/api/v1/auth/me` remains a compatibility alias.
      responses:
        "200":
          description: Current user and tenant context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/me/navigation:
    get:
      tags: [Auth]
      operationId: getMeNavigation
      description: Concrete FE-S1 navigation and button permission state.
      responses:
        "200":
          description: Navigation items and button permission states for current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NavigationEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/me/permissions:
    get:
      tags: [Auth]
      operationId: getMePermissions
      description: Canonical S1 effective permissions with button permission state.
      responses:
        "200":
          description: Permission codes and FE button permission states.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentPermissionEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/users:
    get:
      tags: [RBAC]
      operationId: listUsers
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paged users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"
    post:
      tags: [RBAC]
      operationId: createUser
      requestBody:
        $ref: "#/components/requestBodies/UserWrite"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/users/{user_id}:
    patch:
      tags: [RBAC]
      operationId: updateUser
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        $ref: "#/components/requestBodies/UserWrite"
      responses:
        "200":
          description: User updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/users/{user_id}/roles:
    patch:
      tags: [RBAC]
      operationId: updateUserRoles
      description: Canonical S1 role mutation alias; persists through users/user_roles and writes `user.roles_update` audit.
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        $ref: "#/components/requestBodies/UserRolesUpdate"
      responses:
        "200":
          description: User roles updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/users/{user_id}/status:
    patch:
      tags: [RBAC]
      operationId: updateUserStatus
      description: Canonical S1 status mutation alias; persists through users and writes `user.status_update` audit.
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        $ref: "#/components/requestBodies/UserStatusUpdate"
      responses:
        "200":
          description: User status updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/roles:
    get:
      tags: [RBAC]
      operationId: listRoles
      responses:
        "200":
          description: Roles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"
    post:
      tags: [RBAC]
      operationId: createRole
      requestBody:
        $ref: "#/components/requestBodies/RoleWrite"
      responses:
        "201":
          description: Role created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/roles/{role_id}:
    patch:
      tags: [RBAC]
      operationId: updateRole
      parameters:
        - $ref: "#/components/parameters/RoleId"
      requestBody:
        $ref: "#/components/requestBodies/RoleWrite"
      responses:
        "200":
          description: Role updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/audit-logs:
    get:
      tags: [Audit]
      operationId: listAuditLogs
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: object_type
          in: query
          schema: { type: string }
        - name: object_id
          in: query
          schema: { type: string }
        - name: actor_id
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paged audit logs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/audit-logs/{audit_id}:
    get:
      tags: [Audit]
      operationId: getAuditLog
      parameters:
        - $ref: "#/components/parameters/AuditId"
      responses:
        "200":
          description: Audit log detail including before/after/reason.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/reviews:
    get:
      tags: [Review]
      operationId: listReviews
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: object_type
          in: query
          schema:
            $ref: "#/components/schemas/ReviewObjectType"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ReviewStatus"
      responses:
        "200":
          description: Paged review tasks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"
    post:
      tags: [Review]
      operationId: createReview
      requestBody:
        $ref: "#/components/requestBodies/ReviewCreate"
      responses:
        "201":
          description: Review created in pending state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/reviews/{review_id}:
    get:
      tags: [Review]
      operationId: getReview
      parameters:
        - $ref: "#/components/parameters/ReviewId"
      responses:
        "200":
          description: Review detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"
    patch:
      tags: [Review]
      operationId: updateReviewResult
      parameters:
        - $ref: "#/components/parameters/ReviewId"
      requestBody:
        $ref: "#/components/requestBodies/ReviewUpdate"
      responses:
        "200":
          description: Review result recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/reviews/{review_id}/gate-check:
    post:
      tags: [Review]
      operationId: runReviewGateCheck
      parameters:
        - $ref: "#/components/parameters/ReviewId"
      responses:
        "200":
          description: Gate check result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateCheckEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/reviews/{review_id}/waive:
    post:
      tags: [Review]
      operationId: waiveReview
      parameters:
        - $ref: "#/components/parameters/ReviewId"
      requestBody:
        $ref: "#/components/requestBodies/WaiverCreate"
      responses:
        "200":
          description: Review waived with business approval.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/review-templates:
    get:
      tags: [Review]
      operationId: listReviewTemplates
      responses:
        "200":
          description: Review templates by object type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewTemplateListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/review-gates:
    post:
      tags: [Review]
      operationId: createReviewGate
      description: S1 review-gate alias backed by existing `reviews` persistence.
      requestBody:
        $ref: "#/components/requestBodies/ReviewGateCreate"
      responses:
        "200":
          description: Review gate created as a review record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewGateRecordEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/tasks/{task_id}/review-gates:
    get:
      tags: [Review, Task]
      operationId: listTaskReviewGates
      description: Lists review gates for a task from existing `reviews` rows where `object_type=task`.
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Review gates for a task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewGateRecordListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/review-gates/{review_gate_id}/retest:
    post:
      tags: [Review]
      operationId: retestReviewGate
      description: S1 retest alias backed by `reviews` and `review_results`.
      parameters:
        - $ref: "#/components/parameters/ReviewGateId"
      requestBody:
        $ref: "#/components/requestBodies/ReviewGateRetest"
      responses:
        "200":
          description: Review gate retest result recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewGateRecordEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/review-checklists/versions:
    post:
      tags: [Review]
      operationId: createReviewChecklistVersion
      description: S1 checklist-version alias backed by existing `review_templates` persistence.
      requestBody:
        $ref: "#/components/requestBodies/ReviewChecklistVersionCreate"
      responses:
        "200":
          description: Review checklist version created as a review template.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewChecklistVersionEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/release/review-gates-summary:
    get:
      tags: [Review]
      operationId: getReleaseReviewGatesSummary
      description: Release gate summary computed from existing `reviews` rows.
      responses:
        "200":
          description: Release review-gate summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewGateSummaryEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/ops/health:
    get:
      tags: [Ops]
      operationId: getOpsHealth
      description: Canonical S1 aggregate ops health route.
      responses:
        "200":
          description: API, DB, and worker health summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsHealthSummaryEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/ops/api-health:
    get:
      tags: [Ops]
      operationId: getApiHealthCanonical
      description: Canonical S1 API health route. `/api/v1/ops/health/api` remains a compatibility alias.
      responses:
        "200":
          description: API health.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/ops/db-health:
    get:
      tags: [Ops]
      operationId: getDbHealthCanonical
      description: Canonical S1 DB health route. `/api/v1/ops/health/db` remains a compatibility alias.
      responses:
        "200":
          description: DB health.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/ops/health/api:
    get:
      tags: [Ops]
      operationId: getApiHealth
      responses:
        "200":
          description: API health.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/ops/health/db:
    get:
      tags: [Ops]
      operationId: getDbHealth
      responses:
        "200":
          description: DB health and migration version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/ops/health/workers:
    get:
      tags: [Ops]
      operationId: getWorkerHealth
      responses:
        "200":
          description: Worker health.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerHealthListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/workflow-runs:
    get:
      tags: [Ops]
      operationId: listWorkflowRuns
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: object_type
          in: query
          schema: { type: string }
        - name: object_id
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Workflow runs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/ops/error-queue:
    get:
      tags: [Ops]
      operationId: listErrorQueue
      responses:
        "200":
          description: Failed activities and jobs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueItemListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/ops/retry-queue:
    get:
      tags: [Ops]
      operationId: listRetryQueue
      responses:
        "200":
          description: Retryable activities and jobs, including persisted retry attempts and exponential backoff state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsRetryQueueListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/dead-letters:
    get:
      tags: [Sources, Ops]
      operationId: listDeadLetters
      description: Canonical S2 dead-letter ledger for failed collection/import payloads, backed by persisted ops error records.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema: { type: string, enum: [open, triaged, resolved, ignored] }
        - name: data_source_id
          in: query
          schema: { type: string }
        - name: error_code
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Dead-letter records with failure payload, retry policy state, and target references.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeadLetterListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/dead-letters/{dead_letter_id}/replay:
    post:
      tags: [Sources, Ops]
      operationId: replayDeadLetter
      description: Replays a failed import dead-letter through the original import workflow path and marks the dead letter resolved only after a completed replay.
      parameters:
        - $ref: "#/components/parameters/DeadLetterId"
      requestBody:
        $ref: "#/components/requestBodies/DeadLetterReplayRequest"
      responses:
        "200":
          description: Dead-letter replay result. Repeated successful replays are idempotent and return the prior replay run.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeadLetterReplayEnvelope"
        "409":
          description: Dead letter cannot be replayed because the source version/config hash no longer matches.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/ops/metrics:
    get:
      tags: [Ops]
      operationId: getMetrics
      responses:
        "200":
          description: API, DB, worker, workflow, LLM, and media metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/data-source-types:
    get:
      tags: [Sources]
      operationId: listDataSourceTypes
      responses:
        "200":
          description: Allowed data source types.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSourceTypeListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/collection-channels:
    get:
      tags: [Sources]
      operationId: listCollectionChannels
      description: Canonical AT-293 collection channel registry for source creation. Returns configured channels and warnings for channels whose dedicated adapter is not registered yet.
      responses:
        "200":
          description: Collection channels.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionChannelListEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/collection-channels/adapter-contract:
    get:
      tags: [Sources]
      operationId: validateChannelAdapterContract
      description: Canonical AT-294 backend startup/service validation for registered channel adapters. Registered adapters must implement discover, fetch, parse, and normalize; unregistered future channel adapters are reported as degraded channel warnings.
      responses:
        "200":
          description: Channel adapter contract validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelAdapterContractValidationEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/collection-channels/error-codes:
    get:
      tags: [Sources]
      operationId: mapCollectionChannelErrorCodes
      description: Canonical AT-302 service `map_channel_error_codes`. Returns channel-specific readable run/import error mappings; unmapped requested codes return classification `unknown` and `CHANNEL_ERROR_CODE_UNMAPPED` warnings.
      x-covered-error-codes:
        - official_api_key_missing
        - OFFICIAL_API_RATE_LIMITED
        - OFFICIAL_API_UNAUTHORIZED
        - RSS_FEED_RATE_LIMITED
        - FILE_UPLOAD_TYPE_NOT_ALLOWED
        - MEDIA_FORMAT_NOT_ALLOWED
        - VIDEO_LARGE_POLICY_REQUIRED
        - LIVE_RETENTION_POLICY_REQUIRED
        - LIVE_STREAM_PROTOCOL_UNSUPPORTED
        - AUDIO_LANGUAGE_UNSUPPORTED
        - AUDIO_FORMAT_NOT_ALLOWED
        - CHANNEL_RATE_LIMITED
        - CHANNEL_ERROR_CODE_UNMAPPED
      parameters:
        - name: channel
          in: query
          required: false
          schema:
            type: string
            enum: [web_page, official_api, rss, document_file, image_file, video_file, livestream, audio_file, webhook, database, object_storage]
        - name: error_code
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Channel error code mappings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelErrorCodeMapEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/collection-channels/{channel}/schema:
    get:
      tags: [Sources]
      operationId: getCollectionChannelSchema
      description: Canonical AT-295+ channel configuration schema. Frozen schemas currently cover web_page, official_api, document_file, image_file, video_file, livestream, and audio_file setup contracts.
      parameters:
        - name: channel
          in: path
          required: true
          schema:
            type: string
            enum: [web_page, official_api, document_file, image_file, video_file, livestream, audio_file]
      responses:
        "200":
          description: Collection channel configuration schema.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionChannelSchemaEnvelope"
        default:
          $ref: "#/components/responses/ErrorEnvelope"

  /api/v1/collection-channels/{channel}/quality-metrics:
    get:
      tags: [Sources]
      operationId: getCollectionChannelQualityMetrics
      description: Canonical AT-305 channel quality metrics view. Aggregates channel-specific collection runs, raw records, lineage edges, and data-quality issues from PostgreSQL; unknown channels return `404 CHANNEL_NOT_FOUND`.
      parameters:
        - name: channel
          in: path
          required: true
          schema:
            type: string
