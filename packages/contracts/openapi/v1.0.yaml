        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/CleanRecord"
            meta:
              type: object
              required: [pagination, filters, page_state, status_counts, status_counts_scope, summary, required_permission]
              properties:
                pagination:
                  type: object
                  required: [page, page_size, total]
                  properties:
                    page: { type: integer, minimum: 1 }
                    page_size: { type: integer, minimum: 1, maximum: 100 }
                    total: { type: integer, minimum: 0 }
                filters:
                  type: object
                  additionalProperties: true
                page_state: { type: string, enum: [ready, empty] }
                status_counts:
                  type: object
                  description: Counts for records returned on the current page, not a full result-set aggregation.
                  additionalProperties: { type: integer, minimum: 0 }
                status_counts_scope: { type: string, enum: [page] }
                summary:
                  type: object
                  required: [returned_count, total, content_redacted, source]
                  properties:
                    returned_count: { type: integer, minimum: 0 }
                    total: { type: integer, minimum: 0 }
                    content_redacted: { type: boolean, enum: [true] }
                    source: { type: string, enum: [postgresql] }
                required_permission: { type: string, enum: ["data_source:read"] }
